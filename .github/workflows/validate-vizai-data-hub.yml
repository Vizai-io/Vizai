name: Validate VizAI Data Hub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-vizai-data-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate example customer profile
        run: python scripts/validate_business_profile.py businesses/example-co

      - name: Build registry entry for example customer
        run: python scripts/build_registry_entry.py businesses/example-co

      - name: Build dataset catalog
        run: python scripts/build_dataset_catalog.py

      - name: Build sitemap
        run: python scripts/build_sitemap.py
